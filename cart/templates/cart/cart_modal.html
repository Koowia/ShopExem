<div id="cart-modal" style="position: fixed; right: 0; top: 0; height: 100vh; width: 100%; max-width: 420px; background: #ffffff; box-shadow: -4px 0 24px rgba(0,0,0,0.12); z-index: 50; display: flex; flex-direction: column;">

    <!-- Шапка -->
    <div style="padding: 1.5rem 1.75rem; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="font-size: 0.7rem; letter-spacing: 0.3em; color: #0a0a0a; font-weight: 600; font-family: 'Inter', sans-serif;">КОРЗИНА</h2>
        <button onclick="closeCart()" style="font-size: 1.4rem; color: #aaa; background: none; border: none; cursor: pointer; line-height: 1; padding: 0;" onmouseover="this.style.color='#0a0a0a'" onmouseout="this.style.color='#aaa'">×</button>
    </div>

    <!-- Товары -->
    <div style="flex: 1; overflow-y: auto; padding: 0 1.75rem;">
        <div id="cart-items">
            {% for item in cart_items %}
                {% include 'cart/cart_item.html' %}
            {% empty %}
                <div style="text-align: center; padding: 4rem 0;">
                    <p style="font-size: 0.65rem; letter-spacing: 0.2em; color: #aaa; font-family: 'Inter', sans-serif; margin-bottom: 1rem;">КОРЗИНА ПУСТА</p>
                    <button onclick="closeCart()" style="font-size: 0.6rem; letter-spacing: 0.2em; color: #0a0a0a; background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; border-bottom: 1px solid #0a0a0a; padding-bottom: 2px;">ПРОДОЛЖИТЬ ПОКУПКИ</button>
                </div>
            {% endfor %}
        </div>
    </div>

    <!-- Футер -->
    <div id="cart-summary" style="border-top: 1px solid #f0f0f0; padding: 1.5rem 1.75rem;">
        {% if cart_items %}
            {% include 'cart/cart_summary.html' %}
        {% endif %}
    </div>
</div>

<!-- Оверлей -->
<div id="cart-overlay" onclick="closeCart()" style="position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 40; opacity: 0; visibility: hidden; transition: all 0.3s;"></div>

<style>
#cart-overlay.open { opacity: 1; visibility: visible; }
#cart-overlay.closed { opacity: 0; visibility: hidden; }
</style>

<script>
function openCart() {
    const modal = document.getElementById('cart-modal');
    const overlay = document.getElementById('cart-overlay');
    if (modal && overlay) {
        overlay.classList.remove('closed');
        overlay.classList.add('open');
    }
}
function closeCart() {
    const modal = document.getElementById('cart-modal');
    const overlay = document.getElementById('cart-overlay');
    if (modal && overlay) {
        overlay.classList.remove('open');
        overlay.classList.add('closed');
        setTimeout(() => {
            const container = document.getElementById('cart-container');
            if (container) container.innerHTML = '';
        }, 300);
    }
}
document.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.elt.id === 'cart-container') {
        openCart();
    }
});
</script>
