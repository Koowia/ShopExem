{% load main_tags %}
<main style="background-color: #f5f5f5; min-height: 80vh; padding: 4rem 2rem 4rem 2rem;">
    <div style="max-width: 1200px; margin: 0 auto;">
        <div style="margin-bottom: 4rem; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #e0e0e0; padding-bottom: 2rem;">
            <h1 style="font-size: 2.5rem; font-weight: 700; color: #0a0a0a; font-family: 'Inter', sans-serif; letter-spacing: -0.02em;">КАТАЛОГ</h1>
            <p style="font-size: 0.7rem; letter-spacing: 0.2em; color: #999; font-family: 'Inter', sans-serif;">{{ categories|length }} КАТЕГОРИИ</p>
        </div>
        <div style="display: flex; flex-direction: column;">
            {% for category in categories %}
            <a href="{% url 'main:catalog' category.slug %}"
               hx-get="{% url 'main:catalog' category.slug %}"
               hx-target="#main-content"
               hx-push-url="true"
               class="catalog-row-card">
                <span class="catalog-row-name">{{ category.name|upper }}</span>
                <div class="catalog-row-right">
                    <span class="catalog-row-count">{{ category.products.count|pluralize_ru:"товар,товара,товаров" }}</span>
                    <span class="catalog-row-arrow">→</span>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</main>

<style>
.catalog-row-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2.5rem 0;
    border-bottom: 1px solid #e0e0e0;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
    padding-left: 1.5rem;
}
.catalog-row-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 0;
    background-color: #0a0a0a;
    transition: height 0.3s ease;
}
.catalog-row-card:hover::before {
    height: 60%;
}
.catalog-row-name {
    font-size: clamp(1.8rem, 4vw, 3.5rem);
    font-weight: 700;
    color: #ccc;
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.02em;
    transition: color 0.3s ease, letter-spacing 0.4s ease;
}
.catalog-row-card:hover .catalog-row-name {
    color: #0a0a0a;
    letter-spacing: 0.02em;
}
.catalog-row-right {
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-shrink: 0;
}
.catalog-row-count {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: #ddd;
    font-family: 'Inter', sans-serif;
    transition: color 0.3s ease;
}
.catalog-row-card:hover .catalog-row-count {
    color: #999;
}
.catalog-row-arrow {
    font-size: 1.2rem;
    color: #ddd;
    transition: all 0.3s ease;
    display: inline-block;
    width: 2rem;
    text-align: right;
}
.catalog-row-card:hover .catalog-row-arrow {
    color: #0a0a0a;
    transform: translateX(4px);
}
</style>
