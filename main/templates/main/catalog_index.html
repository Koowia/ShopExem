<main style="background-color: #f5f5f5; min-height: 80vh; padding: 4rem 2rem;">
    <div style="max-width: 1200px; margin: 0 auto;">
        <div style="margin-bottom: 3rem;">
            <p style="font-size: 0.7rem; letter-spacing: 0.3em; color: #999; margin-bottom: 0.5rem; font-family: 'Inter', sans-serif;">ANIMA NOCTIS</p>
            <h1 style="font-size: 2rem; font-weight: 700; color: #0a0a0a; font-family: 'Inter', sans-serif; letter-spacing: -0.02em;">КАТАЛОГ</h1>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1px; background-color: #e0e0e0;">
            {% for category in categories %}
            <a href="{% url 'main:catalog' category.slug %}"
               hx-get="{% url 'main:catalog' category.slug %}"
               hx-target="#main-content"
               hx-push-url="true"
               style="display: flex; flex-direction: column; justify-content: flex-end; padding: 4rem 2.5rem; background-color: #f5f5f5; text-decoration: none; min-height: 280px; transition: background-color 0.3s;"
               class="catalog-index-card">
                <span style="font-size: 0.65rem; letter-spacing: 0.2em; color: #999; font-family: 'Inter', sans-serif; margin-bottom: 0.75rem; display: block;">КАТЕГОРИЯ</span>
                <span style="font-size: 1.1rem; letter-spacing: 0.15em; color: #0a0a0a; font-family: 'Inter', sans-serif; font-weight: 600;" class="catalog-card-name">{{ category.name|upper }}</span>
                <span style="font-size: 0.7rem; letter-spacing: 0.1em; color: #aaa; font-family: 'Inter', sans-serif; margin-top: 0.5rem;">СМОТРЕТЬ →</span>
            </a>
            {% endfor %}
        </div>
    </div>
</main>

<style>
.catalog-index-card:hover {
    background-color: #0a0a0a !important;
}
.catalog-index-card:hover .catalog-card-name {
    color: #f5f5f5;
}
.catalog-index-card:hover span {
    color: #555;
}
</style>
